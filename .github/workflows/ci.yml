name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (shared emit + server typecheck + client bundle)
        run: npm run build

      - name: Server end-to-end smoke test
        run: npm test

      - name: Solo-engine (in-browser path) test
        run: npm run test:solo

      - name: Model loader runtime test
        run: npm run test:model

      - name: Validate dropped-in models
        run: npm run check:models
